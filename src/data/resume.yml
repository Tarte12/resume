Introduce: |
  "안정적인 인증·보안 체계와 AI 기반 개발 공정을 통해, 빠르고 신뢰할 수 있는 백엔드 서비스를 설계합니다."

  == Workflow: 공정 효율화
  - *AI 병렬 오케스트레이션:* Git Worktree 기반으로 작업 공간을 분리하고 다수 AI 에이전트를 동시 가동해 개발 리드타임을 단축했습니다.
  - *AI 가이드라인 최적화:* `CLAUDE.md`와 `AGENTS.md` 체계를 구축해 페르소나/규약을 표준화하고 일관된 협업 프로세스를 정착시켰습니다.
  - *품질 게이트 자동화:* Lint와 TDD를 CI 단계에 결합해 휴먼 에러를 선제 차단하고 회귀 방어력을 강화했습니다.

  == Technical Solution: 설계 및 해결
  - *데이터 모델 정규화:* 비정규화 JSON 구조를 관계형 모델로 재설계해 쿼리 성능과 데이터 정합성을 함께 개선했습니다.
  - *보안 아키텍처 고도화:* Redis 기반 RT(Refresh Token) 관리와 Access Token Blacklist 전략을 적용해 Stateless 환경의 보안 신뢰성을 높였습니다.

