        title: "인증/Member 도메인 설계 및 아키텍처 개선"
        items:
          - "*기능 단위 아키텍처 재편:* 인증/회원 로직이 분산된 구조에서 기능 단위(features/member)로 경계를 재정의하여 결합도 저하 및 변경 영향도 추적 용이성 확보."
          - "*Stateless OAuth 연동:* 세션 기반 OAuth 라이브러리 대신 *RestClient* 수동 연동을 통해 Stateless JWT 구조와 정합성을 맞추고, 외부 API 호출과 DB 트랜잭션 경계를 분리하여 인증 플로우 안정성 확보."
      - tag: "데이터"
        title: "데이터 구조 최적화 및 정규화"
        items:
          - "*JSON 데이터 정규화:* 조회 제한이 있던 JSON 배열 기반의 요일 정보를 정규화 테이블+*JPQL JOIN* 구조로 전환하여 동시 검증 및 조회 확장성 확보."
      - tag: "보안"
        title: "인증 보안 체계 고도화"
        items:
          - "*토큰 저장소 및 보안 강화:* Refresh Token 저장소를 *Redis*(TTL)+SHA-256 해시로 전환하여 토큰 관리 효율 및 유출 대응 수준 강화."
          - "*즉시 무효화 메커니즘:* 로그아웃 시 *Access Token Blacklist*를 도입하여 필터 단계에서 토큰을 즉시 차단함으로써 보안 공백 최소화."
      - tag: "공정"
        title: "AI 협업 가이드 표준화 및 모델별 최적화"
        items:
          - "*가이드 역할 분리:* 범용 규칙은 `AGENTS.md`로 통합하고 Claude 전용 운영 규칙은 `CLAUDE.md/.claude/rules`로 분리해 도구 생태계 차이를 구조적으로 관리."
          - "*모델별 최적화 전략:* 공통 규칙은 단일 source of truth로 유지하고 모델별 파일은 delta-only로 최소화해 중복 프롬프트 충돌 리스크를 축소."
