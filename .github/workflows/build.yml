name: Build Resume PDF
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 릴리즈에 파일을 올리기 위해 권한이 필요합니다.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: chgl/setup-typst@v1

      - name: Build Resume
        run: typst compile resume.typ Kim_Huisu_Resume.pdf

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: Kim_Huisu_Resume.pdf
          body: |
            김희수님의 최신 이력서 PDF 파일입니다.
            빌드 시각: ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
