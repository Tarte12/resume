    team: "팀 프로젝트"
    role: "Backend Infrastructure & Security Lead"
    overview: "FastAPI에서 Spring Boot로의 마이그레이션을 주도하며, 보안 아키텍처 고도화와 데이터 정규화를 통해 시스템의 지속 가능성을 확보했습니다."
    highlights:
      - tag: "설계"
        title: "인증/Member 도메인 설계 및 아키텍처 개선"
        items:
          - "*기능 단위 경계 재정의:* 인증/회원 기능이 분산된 구조에서 `features/member` 기준으로 API/Hook/컴포넌트 경계를 재정의해 결합도를 낮추고 변경 영향 추적성을 높임."
          - "*Stateless OAuth 전환:* 세션 의존 OAuth 방식을 배제하고 Provider API 수동 연동과 외부 호출/DB 트랜잭션 경계 분리를 통해 인증 플로우 안정성을 확보."
      - tag: "데이터"
        title: "데이터 정규화를 통한 조회 구조 개선"
        items:
          - "*조회 모델 전환:* SQLite `json_each` 기반 Native Query 의존을 제거하고 정규화 테이블 분리 + 표준 JPQL JOIN 설계로 시간/요일 동시 검증이 가능하도록 개선."
          - "*시간 표준화:* 시간 타입을 `LocalDateTime`에서 `Instant(UTC)`로 통일해 서버-클라이언트 간 시간대 불일치와 직렬화 해석 차이 리스크를 완화."
      - tag: "보안"
        title: "인증 보안 체계 고도화"
        items:
          - "*토큰 저장/만료 관리 강화:* Refresh Token 저장소를 Redis(TTL)로 전환하고 SHA-256 해시 저장을 적용해 토큰 저장/만료 관리 및 유출 대응 수준을 강화."
          - "*즉시 차단 경로 구성:* 로그아웃 시 Access Token Blacklist를 적용해 만료 전 토큰 재사용 구간을 축소하고 필터 단계에서 즉시 차단되도록 검증 경로를 설계."
          - "*Rate Limit 재설계:* 인증 전 헤더값 기준에서 인증 후 서버 검증 사용자 기준으로 전환해 식별자 위조 우회 가능성을 제거."
      - tag: "품질"
        title: "API 계약 표준화 및 품질 검증 강화"
        items:
          - "*응답 규격 통일:* 엔드포인트별 상이한 응답 포맷을 공통 Envelope(`success/data/error`)로 표준화해 클라이언트 분기 복잡도를 축소."
          - "*계약 검증 강화:* Controller 테스트를 Contract 중심으로 보강해 상태코드/응답 스키마 불일치 회귀를 조기에 탐지."
