name: Build and Commit Resume PDF
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Typst
        run: |
          # 최신 Typst 바이너리를 직접 다운로드하여 설치 (가장 확실한 방법)
          TYPST_VERSION=$(curl -s https://api.github.com/repos/typst/typst/releases/latest | grep -Po '"tag_name": "v\K[^"]*')
          curl -L -o typst.tar.xz "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz"
          tar -xf typst.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/
          typst --version

      - name: Install Korean Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji unzip
          curl -Lf https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip --output Pretendard.zip
          unzip -q Pretendard.zip "public/static/*.otf"
          mkdir -p fonts
          cp -r public/static/*.otf fonts/

      - name: Build Resume
        run: typst compile --font-path fonts --font-path /usr/share/fonts src/resume.typ Kim_Huisu_Resume.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate resume PDF [skip ci]"
          file_pattern: 'Kim_Huisu_Resume.pdf'
