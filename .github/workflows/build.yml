name: Build and Commit Resume PDF
on:
  push:
    branches:
      - main
    paths:
      - 'resume.yml'
      - 'resume.typ'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: chgl/setup-typst@v1

      - name: Build Resume
        run: typst compile resume.typ Kim_Huisu_Resume.pdf

      - name: Commit PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate resume PDF [skip ci]"
          file_pattern: 'Kim_Huisu_Resume.pdf'
